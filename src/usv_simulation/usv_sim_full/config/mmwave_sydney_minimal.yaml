# 毫米波雷达最小验证：开阔水面世界 sydney_regatta_open_water（无岸边/浮标），无自定义障碍/动态场景。
# 船体生成在原点附近，便于观察海面与传感器。
# 激光雷达与毫米波水平位置一致（相对 base_link 均为 xyz 0,0），激光 z 比毫米波高 0.1 m，用于对照点云。
# 启动：ros2 launch usv_sim_full main.launch.py config_path:=$(ros2 pkg prefix usv_sim_full)/share/usv_sim_full/config/mmwave_sydney_minimal.yaml
# 内参仍用与本文件同目录的 sensor_config.yaml（由 sensor_config_path 指定）。
environment:
  world_name: sydney_regatta_open_water
sensor_config_path: config/sensor_config.yaml
obstacles:
  fixed_list: []
scenario:
  dynamic_obstacles: []
visualization:
  launch_rviz: false
  enable_telemetry: true

robot_1:
  name: usv_1
  xacro_template: wamv_no_battery.urdf.xacro
  thruster_config: CUSTOM
  thrusters:
    enabled: true
  # [x, y, z, roll, pitch, yaw] 世界系；开阔水面原点附近
  spawn_pose:
  - 0.0
  - 0.0
  - 0.5
  - 0.0
  - 0.0
  - 0.0
  overrides:
    visual_mesh: package://usv_sim_full/description/models/body-Base/mesh/M5_body.dae
    mass: 500.0
    inertia:
    - 100.0
    - 100.0
    - 200.0
    thruster_positions:
      thruster_pos_x: -2.373776
      thruster_pos_y_left: 0.7
      thruster_pos_y_right: -0.8
      thruster_pos_z: 0.318237
    ground_truth_enabled: true
  buoyancy_params:
    hull_length: 4.9
    hull_radius: 0.213
    fluid_level: 0.0
    xDotU: 0.0
    yDotV: 0.0
    nDotR: 0.0
    xU: 100.0
    xUU: 150.0
    yV: 100.0
    yVV: 100.0
    zW: 500.0
    kP: 300.0
    kPP: 600.0
    mQ: 900.0
    mQQ: 900.0
    nR: 800.0
    nRR: 800.0
  sensors:
  - name: mmwave_front
    type: mmwave_radar
    parent_link: base_link
    xyz:
    - 0.0
    - 0.0
    - 1.9
    rpy:
    - 0.0
    - 0.0
    - 0.0
    override_topic: /sensors/mmwave/mmwave_front/points
    enabled: true
  - name: mmwave_bench_lidar
    type: lidar
    parent_link: base_link
    xyz:
    - 0.0
    - 0.0
    - 2.0
    rpy:
    - 0.0
    - 0.0
    - 0.0
    override_topic: /sensors/lidar/mmwave_bench_lidar/points
    enabled: true
