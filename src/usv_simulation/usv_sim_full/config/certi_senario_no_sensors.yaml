# 认证仿真基底（无传感器版本）
# 用途：用于评估“传感器仿真/桥接/处理链”对 RTF 的影响。
# 使用方式示例：
#   ros2 launch usv_sim_full certifi_launch.launch.py \
#     base_config:=src/usv_simulation/usv_sim_full/config/certi_senario_no_sensors.yaml \
#     case_config:=src/usv_simulation/usv_sim_full/config/certificate_case/C1-001.yaml \
#     gz_headless:=true
#
# 说明：
# - 本文件保留与 `certi_senario.yaml` 相同的世界/船体/动力学配置，但将 `robot_1.sensors` 置空。
# - `visualization.launch_rviz` 关闭，避免 RViz 带来的额外开销。
# - `visualization.enable_telemetry` 关闭，减少桥接/话题数量（如你仍需 telemetry，可改回 true）。

environment:
  world_name: sydney_regatta_open_water

# 仍保留该字段以兼容 session_manager 的解析流程（即使无传感器也不影响）。
sensor_config_path: config/sensor_config.yaml

obstacles:
  fixed_list: []

scenario:
  dynamic_obstacles: []

visualization:
  launch_rviz: false
  enable_telemetry: false

robot_1:
  name: usv_1
  enable_env_dynamics: true
  env_dynamics:
    k_wind: 1.5
    k_current: 250.0
  xacro_template: wamv_no_battery.urdf.xacro
  thruster_config: CUSTOM
  thrusters:
    enabled: true
  spawn_pose:
  - 0.0
  - 0.0
  - 0.5
  - 0.0
  - 0.0
  - 0.0
  overrides:
    visual_mesh: package://usv_sim_full/description/models/body-Base/mesh/M5_body.dae
    mass: 500.0
    inertia:
    - 100.0
    - 100.0
    - 200.0
    thruster_positions:
      thruster_pos_x: -2.373776
      thruster_pos_y_left: 0.75
      thruster_pos_y_right: -0.75
      thruster_pos_z: 0.318237
    ground_truth_enabled: true
  buoyancy_params:
    hull_length: 4.9
    hull_radius: 0.213
    fluid_level: 0.0
    xDotU: 0.0
    yDotV: 0.0
    nDotR: 0.0
    xU: 100.0
    xUU: 150.0
    yV: 100.0
    yVV: 100.0
    zW: 500.0
    kP: 300.0
    kPP: 600.0
    mQ: 900.0
    mQQ: 900.0
    nR: 800.0
    nRR: 800.0

  # 关键：不加载任何传感器模型/桥接/处理链
  sensors: []

