ekf_map_node:
  ros__parameters:
    frequency: 20.0
    sensor_timeout: 0.2
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.2
    print_diagnostics: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    # launch 按船覆盖为 {robot_name}/odom，与 Gazebo OdometryPublisher、ros_gz_bridge 一致
    odom_frame: usv_1/odom
    base_link_frame: usv_1/base_link
    world_frame: map

    # Launch will override these topics per robot instance.
    odom0: /usv_1/odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20

    imu0: /usv_1/sensors/imu/imu_sensor/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size: 50

    odom1: /usv_1/odometry/gps
    odom1_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 20

navsat_transform_node:
  ros__parameters:
    frequency: 20.0
    delay: 0.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: false
    use_odometry_yaw: true
    wait_for_datum: false
