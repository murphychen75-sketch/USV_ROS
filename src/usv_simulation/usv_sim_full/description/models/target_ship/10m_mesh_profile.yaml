profile_name: target_ship_10m_v1
spawn_z: 0.0

# Profile local frame:
#   x: stern -> bow
#   y: port/starboard width (centerline at 0)
#   z: up
#
# Mesh local frame (10m.dae after correction):
#   - roll +90deg makes the raw mesh stand upright on z
#   - yaw  -90deg makes the ship longitudinal axis align with +x
#
# Initial alignment strategy:
#   - keep collision boxes centered on y = 0
#   - keep collision bottoms on z = 0
#   - top-align all boxes to z = 2.0m
#   - apply a tiny +x offset to match the mesh's slightly asymmetric bbox center

mesh:
  uri: model://target_ship/10m.dae
  scale: [1.0, 1.0, 1.0]
  material_rgba: [1.0, 0.95, 0.6, 1.0]
  pose_offset:
    xyz: [0.000503, 0.0, 0.02260607]
    rpy: [1.57079632679, 0.0, -1.57079632679]

collision_group:
  pose_offset:
    xyz: [0.000503, 0.0, -1.0]
    rpy: [0.0, 0.0, 0.0]
  top_plane_z: 1.0
  notes:
    - Input dimensions come from 10m_collosion.md as H*W*L, ordered stern to bow.
    - Boxes are centered on y=0 and top-aligned to the same z plane.

boxes:
  - name: stern_main
    input_hwl_m: [2.0, 3.6, 8.0]
    size_lwh_m: [8.0, 3.6, 2.0]
    pose_xyz_m: [-1.0, 0.0, 1.0]
  - name: mid_front
    input_hwl_m: [1.9, 3.45, 1.0]
    size_lwh_m: [1.0, 3.45, 1.9]
    pose_xyz_m: [3.5, 0.0, 1.05]
  - name: fore_transition
    input_hwl_m: [1.25, 3.2, 0.5]
    size_lwh_m: [0.5, 3.2, 1.25]
    pose_xyz_m: [4.25, 0.0, 1.375]
  - name: bow_tip
    input_hwl_m: [0.76, 3.0, 0.5]
    size_lwh_m: [0.5, 3.0, 0.76]
    pose_xyz_m: [4.75, 0.0, 1.62]
